name: Build libmpv Windows Release
run-name: Build libmpv x64 Clang Full DV
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-libmpv:
    runs-on: windows-latest
    steps:
      - name: Checkout mabs
        uses: actions/checkout@v4
        with:
          repository: m-ab-s/media-autobuild_suite
          path: mabs
          fetch-depth: 1

      - name: Cache build v3
        uses: actions/cache@v4
        with:
          path: |
            mabs/toolchain
            mabs/build
          key: win-mabs-clang-v3

      - name: Create auto ini config
        shell: cmd
        working-directory: ./mabs
        run: |
          if not exist build mkdir build
          echo [options] > build/media-autobuild_suite.ini
          echo arch=3 >> build/media-autobuild_suite.ini
          echo build32=n >> build/media-autobuild_suite.ini
          echo nonfree=y >> build/media-autobuild_suite.ini
          echo cpu=%NUMBER_OF_PROCESSORS% >> build/media-autobuild_suite.ini
          echo buildmpv=n >> build/media-autobuild_suite.ini
          echo libplacebo=y >> build/media-autobuild_suite.ini
          echo ffmpeg=full >> build/media-autobuild_suite.ini
          echo compiler=clang >> build/media-autobuild_suite.ini

      # 官方标准静默编译，彻底移除管道输入，解决set报错+弹窗
      - name: Run MABS official auto silent build
        shell: cmd
        working-directory: ./mabs
        run: media-autobuild_suite.bat --auto

      - name: Package output files
        id: pack_step
        shell: cmd
        run: |
          mkdir libmpv_output
          mkdir libmpv_output\include
          copy mabs\local64\bin-video\include\* libmpv_output\include\ /E /Y
          copy mabs\local64\bin-video\libmpv.dll.a libmpv_output\ /Y
          copy mabs\local64\bin-video\libmpv-2.dll libmpv_output\ /Y

          echo # libmpv Windows 编译产物说明 > libmpv_output\BUILD_INFO.md
          echo ## 编译基础信息 >> libmpv_output\BUILD_INFO.md
          echo - 编译工具链: MinGW Clang x86_64 >> libmpv_output\BUILD_INFO.md
          echo - 架构: 纯64位 >> libmpv_output\BUILD_INFO.md
          echo - 内置 libplacebo + libdovi 杜比视界 >> libmpv_output\BUILD_INFO.md
          echo - FFmpeg full 全编码支持 >> libmpv_output\BUILD_INFO.md
          echo - 无需外置dll，单文件运行 >> libmpv_output\BUILD_INFO.md

          powershell Compress-Archive -Path libmpv_output -DestinationPath libmpv-win64.zip -Force
          echo zipname=libmpv-win64.zip >> %GITHUB_OUTPUT%

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-stable
          release_name: libmpv Windows x64 Clang Full DolbyVision
          body: |
            ### 编译包说明
            - Clang x64 静态编译 libmpv
            - 内置 FFmpeg + libplacebo + libdovi，完整杜比视界P5/P8
            - 仅 libmpv-2.dll 即可运行，无额外依赖
            - 完整依赖查看压缩包内 BUILD_INFO.md
          files: ${{ steps.pack_step.outputs.zipname }}
          overwrite: true
