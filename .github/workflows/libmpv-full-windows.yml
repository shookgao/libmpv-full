name: Build libmpv Windows Release
run-name: Build libmpv x64 Clang Full DV
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-libmpv:
    runs-on: windows-latest
    steps:
      - name: Checkout mabs
        uses: actions/checkout@v4
        with:
          repository: m-ab-s/media-autobuild_suite
          path: mabs
          fetch-depth: 1

      - name: Cache build v5
        uses: actions/cache@v4
        with:
          path: |
            mabs/toolchain
            mabs/build
          key: win-mabs-clang-v5

      - name: Prepare build dir
        shell: cmd
        working-directory: ./mabs
        run: if not exist build mkdir build

      # 核心修复：使用官方精确匹配的无人值守配置字段
      - name: Generate correct mabs configuration file
        shell: cmd
        working-directory: ./mabs
        run: |
          echo [General] > media-autobuild_suite.ini
          echo Architecture=3 >> media-autobuild_suite.ini
          echo DeleteGit=n >> media-autobuild_suite.ini
          echo UpdateSuite=y >> media-autobuild_suite.ini
          echo CPUThreads=%NUMBER_OF_PROCESSORS% >> media-autobuild_suite.ini
          echo Force32=n >> media-autobuild_suite.ini
          echo DeleteBuild=y >> media-autobuild_suite.ini
          echo License=full >> media-autobuild_suite.ini
          echo Compiler=clang >> media-autobuild_suite.ini
          echo ScriptInPath=y >> media-autobuild_suite.ini
          echo OptionChoice=y >> media-autobuild_suite.ini

      # 配合官方的 --silent 参数，强制双重锁死无交互
      - name: Run build in native silent mode
        shell: cmd
        working-directory: ./mabs
        run: media-autobuild_suite.bat --silent

      - name: Package output files
        id: pack_step
        shell: cmd
        run: |
          mkdir libmpv_output
          mkdir libmpv_output\include
          xcopy mabs\local64\bin-video\include\* libmpv_output\include\ /E /Y /I
          copy mabs\local64\bin-video\libmpv.dll.a libmpv_output\ /Y
          copy mabs\local64\bin-video\libmpv-2.dll libmpv_output\ /Y

          echo # libmpv Windows 编译产物说明 > libmpv_output\BUILD_INFO.md
          echo ## 编译基础信息 >> libmpv_output\BUILD_INFO.md
          echo - 编译工具链: MinGW Clang x86_64 >> libmpv_output\BUILD_INFO.md
          echo - 架构: 纯64位 >> libmpv_output\BUILD_INFO.md
          echo - 内置 libplacebo + libdovi 杜比视界 >> libmpv_output\BUILD_INFO.md
          echo - FFmpeg full 全编码支持 >> libmpv_output\BUILD_INFO.md
          echo - 无需外置dll，单文件运行 >> libmpv_output\BUILD_INFO.md

          powershell Compress-Archive -Path libmpv_output -DestinationPath libmpv-win64.zip -Force
          echo zipname=libmpv-win64.zip >> %GITHUB_OUTPUT%

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-stable
          release_name: libmpv Windows x64 Clang Full DolbyVision
          body: |
            ### 编译包说明
            - Clang x64 静态编译 libmpv
            - 内置 FFmpeg + libplacebo + libdovi，完整杜比视界P5/P8
            - 仅 libmpv-2.dll 即可运行，无额外依赖
            - 完整依赖查看压缩包内 BUILD_INFO.md
          files: ${{ steps.pack_step.outputs.zipname }}
          overwrite: true
