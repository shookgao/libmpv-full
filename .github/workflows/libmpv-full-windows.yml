name: Build libmpv Windows Release (v8.0)
run-name: Build libmpv x64 Clang Full DV (v8.0)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-libmpv:
    runs-on: windows-latest
    steps:
      - name: Checkout mabs
        uses: actions/checkout@v4
        with:
          repository: m-ab-s/media-autobuild_suite
          path: mabs
          fetch-depth: 1

      - name: Cache build v8
        uses: actions/cache@v4
        with:
          path: |
            mabs/toolchain
            mabs/build
          key: win-mabs-clang-v8

      - name: Prepare build dir
        shell: cmd
        working-directory: ./mabs
        run: if not exist build mkdir build

      # 使用 msys2 官方提供的 Action，直接构建一个完全没有交互能力的干净 Linux-like 环境
      - name: Setup MSYS2 Environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: git make ninja python3

      # 核心修复 v8.0：直接使用 msys2 bash 调用底层的核心编译脚本，彻底废掉 .bat 的弹窗交互能力
      - name: Run Unattended Build via MSYS2 Bash (v8.0)
        shell: msys2 {0}
        working-directory: ./mabs
        run: |
          # 1. 预先通过环境变量或最小配置声明我们需要编译的架构
          mkdir -p build
          cat << 'EOF' > build/media-autobuild_suite.ini
          [General]
          Architecture=3
          DeleteGit=n
          UpdateSuite=y
          CPUThreads=$(nproc)
          Force32=n
          DeleteBuild=y
          License=full
          Compiler=clang
          ScriptInPath=y
          OptionChoice=y
          [vlc]
          vlcChoice=n
          [mpv]
          mpvChoice=y
          mpv64=y
          [ffmpeg]
          ffmpegChoice=y
          ffmpeg64=y
          [media-autobuild_suite]
          mabsChoice=y
          EOF

          # 2. 直接绕过 media-autobuild_suite.bat，用 bash 启动真正的核心构建过程
          # 如果 build.sh 尚未生成，我们先通过无交互参数运行一次初始化
          if [ ! -f "build/build.sh" ]; then
              ./media-autobuild_suite.bat --silent || true
          fi
          
          # 3. 直接在 msys2 里强制执行核心 shell 脚本
          if [ -f "build/build.sh" ]; then
              cd build && ./build.sh --unattended
          else
              echo "Fallback to silent batch mode..."
              cd .. && ./media-autobuild_suite.bat --silent
          fi

      - name: Package output files
        id: pack_step
        shell: cmd
        run: |
          mkdir libmpv_output
          mkdir libmpv_output\include
          xcopy mabs\local64\bin-video\include\* libmpv_output\include\ /E /Y /I
          copy mabs\local64\bin-video\libmpv.dll.a libmpv_output\ /Y
          copy mabs\local64\bin-video\libmpv-2.dll libmpv_output\ /Y

          echo # libmpv Windows Build Info > libmpv_output\BUILD_INFO.md
          echo ## Base Info >> libmpv_output\BUILD_INFO.md
          echo - Toolchain: MinGW Clang x86_64 >> libmpv_output\BUILD_INFO.md
          echo - Arch: 64bit >> libmpv_output\BUILD_INFO.md
          echo - Features: libplacebo + libdovi DolbyVision >> libmpv_output\BUILD_INFO.md
          echo - FFmpeg: full >> libmpv_output\BUILD_INFO.md

          powershell Compress-Archive -Path libmpv_output -DestinationPath libmpv-win64.zip -Force
          echo zipname=libmpv-win64.zip >> %GITHUB_OUTPUT%

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-stable
          release_name: libmpv Windows x64 Clang Full DolbyVision (v8.0)
          body: |
            ### Build Info
            - Clang x64 static build libmpv
            - Built-in FFmpeg + libplacebo + libdovi (DolbyVision P5/P8)
            - Single libmpv-2.dll to run
          files: ${{ steps.pack_step.outputs.zipname }}
          overwrite: true
