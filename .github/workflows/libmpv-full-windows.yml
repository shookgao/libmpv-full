name: Build libmpv Windows Release (v9.0)
run-name: Build libmpv x64 Clang Full DV (v9.0)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-libmpv:
    runs-on: windows-latest
    steps:
      - name: Checkout mabs
        uses: actions/checkout@v4
        with:
          repository: m-ab-s/media-autobuild_suite
          path: mabs
          fetch-depth: 1

      # 恢复原本的极速缓存
      - name: Cache build v9
        uses: actions/cache@v4
        with:
          path: |
            mabs/toolchain
            mabs/build
          key: win-mabs-clang-v9

      - name: Prepare build dir
        shell: cmd
        working-directory: ./mabs
        run: if not exist build mkdir build

      # 核心修复 v9.0：移除耗时 MSYS2，用 PowerShell 直接抽掉 .bat 里的交互式输入函数（set /p）
      # 让脚本在完全没有输入的情况下自动套用默认值或预设值
      - name: Kill Interactive Inputs (v9.0)
        shell: powershell
        working-directory: ./mabs
        run: |
          $batPath = "media-autobuild_suite.bat"
          $content = Get-Content $batPath -Raw
          
          # 1. 在脚本最开头强制塞入你所需要的目标变量，确保其优先级最高
          $presetVariables = @"
          @echo off
          set "Architecture=3"
          set "DeleteGit=n"
          set "UpdateSuite=y"
          set "CPUThreads=$env:NUMBER_OF_PROCESSORS"
          set "Force32=n"
          set "DeleteBuild=y"
          set "License=full"
          set "Compiler=clang"
          set "ScriptInPath=y"
          set "OptionChoice=y"
          set "mpvChoice=y"
          set "mpv64=y"
          set "ffmpegChoice=y"
          set "ffmpeg64=y"
          "@
          $content = $content -replace "@echo off", $presetVariables

          # 2. 暴力降维打击：通过正则把脚本里所有形如 "set /p 变量=" 的交互式输入命令
          # 替换成不需要等待输入的普通的赋值语句，彻底根除卡死状态
          $content = $content -replace 'set\s+/p\s+([a-zA-Z0-9_]+)=.*', 'set "$1=" '
          
          Set-Content -Path $batPath -Value $content -Encoding utf8
          Write-Host "成功应用 v9.0 补丁：已移除全部慢速组件，并强制剥离脚本的交互式键盘输入逻辑。"

      # 运行已经完全丧失交互提问能力的本地批处理
      - name: Run build (v9.0)
        shell: cmd
        working-directory: ./mabs
        run: media-autobuild_suite.bat --silent

      - name: Package output files
        id: pack_step
        shell: cmd
        run: |
          mkdir libmpv_output
          mkdir libmpv_output\include
          xcopy mabs\local64\bin-video\include\* libmpv_output\include\ /E /Y /I
          copy mabs\local64\bin-video\libmpv.dll.a libmpv_output\ /Y
          copy mabs\local64\bin-video\libmpv-2.dll libmpv_output\ /Y

          echo # libmpv Windows Build Info > libmpv_output\BUILD_INFO.md
          echo ## Base Info >> libmpv_output\BUILD_INFO.md
          echo - Toolchain: MinGW Clang x86_64 >> libmpv_output\BUILD_INFO.md
          echo - Arch: 64bit >> libmpv_output\BUILD_INFO.md
          echo - Features: libplacebo + libdovi DolbyVision >> libmpv_output\BUILD_INFO.md
          echo - FFmpeg: full >> libmpv_output\BUILD_INFO.md

          powershell Compress-Archive -Path libmpv_output -DestinationPath libmpv-win64.zip -Force
          echo zipname=libmpv-win64.zip >> %GITHUB_OUTPUT%

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-stable
          release_name: libmpv Windows x64 Clang Full DolbyVision (v9.0)
          body: |
            ### Build Info
            - Clang x64 static build libmpv
            - Built-in FFmpeg + libplacebo + libdovi (DolbyVision P5/P8)
            - Single libmpv-2.dll to run
          files: ${{ steps.pack_step.outputs.zipname }}
          overwrite: true
