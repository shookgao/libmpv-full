name: Build libmpv Windows Release (v7.0)
run-name: Build libmpv x64 Clang Full DV (v7.0)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-libmpv:
    runs-on: windows-latest
    steps:
      - name: Checkout mabs
        uses: actions/checkout@v4
        with:
          repository: m-ab-s/media-autobuild_suite
          path: mabs
          fetch-depth: 1

      # 缓存目录调整：确保缓存的是 build 和 toolchain 文件夹
      - name: Cache build v7
        uses: actions/cache@v4
        with:
          path: |
            mabs/toolchain
            mabs/build
          key: win-mabs-clang-v7

      # 核心修复 v7.0：建立官方标准的无人值守构建目录，并生成对应的编译控制桩
      - name: Pre-configure Unattended Build (v7.0)
        shell: cmd
        working-directory: ./mabs
        run: |
          if not exist build mkdir build
          
          :: 1. 写入全局首选项
          (
            echo [General]
            echo Architecture=3
            echo DeleteGit=n
            echo UpdateSuite=y
            echo CPUThreads=%NUMBER_OF_PROCESSORS%
            echo Force32=n
            echo DeleteBuild=y
            echo License=full
            echo Compiler=clang
            echo ScriptInPath=y
            echo OptionChoice=y
            echo.
            echo [vlc]
            echo vlcChoice=n
            echo.
            echo [mpv]
            echo mpvChoice=y
            echo mpv64=y
            echo.
            echo [ffmpeg]
            echo ffmpegChoice=y
            echo ffmpeg64=y
            echo.
            echo [media-autobuild_suite]
            echo mabsChoice=y
          ) > build\media-autobuild_suite.ini

          :: 2. 核心补丁：生成强制编译控制桩，告诉脚本不需要再次向用户确认编什么
          echo. > build\mpv.compile
          echo. > build\ffmpeg.compile
          echo. > build\libplacebo.compile
          echo. > build\libdovi.compile

      # 携带标准的 --silent 标志启动
      - name: Run Unattended Build (v7.0)
        shell: cmd
        working-directory: ./mabs
        run: media-autobuild_suite.bat --silent

      - name: Package output files
        id: pack_step
        shell: cmd
        run: |
          mkdir libmpv_output
          mkdir libmpv_output\include
          xcopy mabs\local64\bin-video\include\* libmpv_output\include\ /E /Y /I
          copy mabs\local64\bin-video\libmpv.dll.a libmpv_output\ /Y
          copy mabs\local64\bin-video\libmpv-2.dll libmpv_output\ /Y

          echo # libmpv Windows Build Info > libmpv_output\BUILD_INFO.md
          echo ## Base Info >> libmpv_output\BUILD_INFO.md
          echo - Toolchain: MinGW Clang x86_64 >> libmpv_output\BUILD_INFO.md
          echo - Arch: 64bit >> libmpv_output\BUILD_INFO.md
          echo - Features: libplacebo + libdovi DolbyVision >> libmpv_output\BUILD_INFO.md
          echo - FFmpeg: full >> libmpv_output\BUILD_INFO.md

          powershell Compress-Archive -Path libmpv_output -DestinationPath libmpv-win64.zip -Force
          echo zipname=libmpv-win64.zip >> %GITHUB_OUTPUT%

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-stable
          release_name: libmpv Windows x64 Clang Full DolbyVision (v7.0)
          body: |
            ### Build Info
            - Clang x64 static build libmpv
            - Built-in FFmpeg + libplacebo + libdovi (DolbyVision P5/P8)
            - Single libmpv-2.dll to run
          files: ${{ steps.pack_step.outputs.zipname }}
          overwrite: true
