name: Build libmpv Windows Release (v6.0)
run-name: Build libmpv x64 Clang Full DV (v6.0)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-libmpv:
    runs-on: windows-latest
    steps:
      - name: Checkout mabs
        uses: actions/checkout@v4
        with:
          repository: m-ab-s/media-autobuild_suite
          path: mabs
          fetch-depth: 1

      - name: Cache build v5
        uses: actions/cache@v4
        with:
          path: |
            mabs/toolchain
            mabs/build
          key: win-mabs-clang-v5

      - name: Prepare build dir
        shell: cmd
        working-directory: ./mabs
        run: if not exist build mkdir build

      # 核心修复 v6.0：全英文无特殊字符脚本，使用基础拼接，彻底杜绝乱码导致的单引号闭合错误
      - name: Force Patch Build Script (v6.0)
        shell: powershell
        working-directory: ./mabs
        run: |
          $batPath = "media-autobuild_suite.bat"
          $content = Get-Content $batPath -Raw
          
          # Use standard string array to avoid encoding and character issues
          $patchLines = @(
              "@echo off",
              "set `"Architecture=3`"",
              "set `"DeleteGit=n`"",
              "set `"UpdateSuite=y`"",
              "set `"CPUThreads=$env:NUMBER_OF_PROCESSORS`"",
              "set `"Force32=n`"",
              "set `"DeleteBuild=y`"",
              "set `"License=full`"",
              "set `"Compiler=clang`"",
              "set `"ScriptInPath=y`"",
              "set `"OptionChoice=y`"",
              "set `"mpvChoice=y`"",
              "set `"mpv64=y`"",
              "set `"ffmpegChoice=y`"",
              "set `"ffmpeg64=y`""
          )
          $patchText = [string]::Join([Environment]::NewLine, $patchLines)
          
          # Replace the first line safely
          $content = $content -replace "@echo off", $patchText
          Set-Content -Path $batPath -Value $content -Encoding utf8
          Write-Host "Patch v6.0 applied successfully."

      # 运行已经失去提问能力的脚本
      - name: Run build (v6.0)
        shell: cmd
        working-directory: ./mabs
        run: media-autobuild_suite.bat

      - name: Package output files
        id: pack_step
        shell: cmd
        run: |
          mkdir libmpv_output
          mkdir libmpv_output\include
          xcopy mabs\local64\bin-video\include\* libmpv_output\include\ /E /Y /I
          copy mabs\local64\bin-video\libmpv.dll.a libmpv_output\ /Y
          copy mabs\local64\bin-video\libmpv-2.dll libmpv_output\ /Y

          echo # libmpv Windows Build Info > libmpv_output\BUILD_INFO.md
          echo ## Base Info >> libmpv_output\BUILD_INFO.md
          echo - Toolchain: MinGW Clang x86_64 >> libmpv_output\BUILD_INFO.md
          echo - Arch: 64bit >> libmpv_output\BUILD_INFO.md
          echo - Features: libplacebo + libdovi DolbyVision >> libmpv_output\BUILD_INFO.md
          echo - FFmpeg: full >> libmpv_output\BUILD_INFO.md

          powershell Compress-Archive -Path libmpv_output -DestinationPath libmpv-win64.zip -Force
          echo zipname=libmpv-win64.zip >> %GITHUB_OUTPUT%

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-stable
          release_name: libmpv Windows x64 Clang Full DolbyVision (v6.0)
          body: |
            ### Build Info
            - Clang x64 static build libmpv
            - Built-in FFmpeg + libplacebo + libdovi (DolbyVision P5/P8)
            - Single libmpv-2.dll to run
          files: ${{ steps.pack_step.outputs.zipname }}
          overwrite: true
