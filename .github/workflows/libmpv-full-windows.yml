name: Build libmpv Windows Release (v12.7)
run-name: Build libmpv x64 Clang Full DV (v12.7)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-libmpv:
    runs-on: windows-latest
    steps:
      - name: Checkout mabs
        uses: actions/checkout@v4
        with:
          repository: m-ab-s/media-autobuild_suite
          path: m
          fetch-depth: 1

      - name: Cache build v12
        uses: actions/cache@v4
        with:
          path: |
            m/toolchain
            m/build
          key: win-mabs-clang-v12

      - name: Prepare build dir
        shell: cmd
        working-directory: ./m
        run: if not exist build mkdir build

      - name: Pre-stage compile stubs
        shell: cmd
        working-directory: ./m
        run: |
          :: 强制生成编译控制桩，在跳过非核心提问后直接锁定 libdovi 和相关依赖
          echo. > build\libdovi.compile
          echo. > build\libplacebo.compile
          echo. > build\mpv.compile
          echo. > build\ffmpeg.compile

      - name: Dynamic Smart Feed Process
        shell: powershell
        working-directory: ./m
        run: |
          $pInfo = New-Object System.Diagnostics.ProcessStartInfo
          $pInfo.FileName = "cmd.exe"
          # 移除 --non-interactive 避免死循环，走正常无人值守读取模式
          $pInfo.Arguments = "/c media-autobuild_suite.bat --unattended"
          $pInfo.RedirectStandardInput = $true
          $pInfo.RedirectStandardOutput = $true
          $pInfo.RedirectStandardError = $true
          $pInfo.UseShellExecute = $false
          
          $process = New-Object System.Diagnostics.Process
          $process.StartInfo = $pInfo
          [void]$process.Start()
          
          # 实时逐行读取输出，发现特定关键字再送入对应答案，解决错位问题
          while (-not $process.HasExited) {
              $line = $process.StandardOutput.ReadLine()
              if ($line) {
                  Write-Host $line
                  
                  # 1. 碰到路径过长弹窗（双重保险）
                  if ($line -like "*Press any key to continue*") {
                      Write-Host "[CI Agent] Detected Path Warning, sending Enter..." -ForegroundColor Yellow
                      $process.StandardInput.WriteLine("")
                      $process.StandardInput.Flush()
                  }
                  # 2. 只有看到明确的架构选择提问时，才喂 "3"
                  elseif ($line -like "*Select the build target system*") {
                      Write-Host "[CI Agent] Detected Architecture Question, sending 3..." -ForegroundColor Green
                      $process.StandardInput.WriteLine("3")
                      $process.StandardInput.Flush()
                  }
                  # 3. 只有看到明确的许可证提问时，才喂 "1"
                  elseif ($line -like "*Build FFmpeg with which license*") {
                      Write-Host "[CI Agent] Detected License Question, sending 1..." -ForegroundColor Green
                      $process.StandardInput.WriteLine("1")
                      $process.StandardInput.Flush()
                  }
                  # 4. 其它任何需要确认的交互（比如是否同意non-free）统一喂 "y"
                  elseif ($line -like "*[y/N]*" -or $line -like "*[Y/n]*" -or $line -like "*Is this correct*") {
                      Write-Host "[CI Agent] Detected Confirmation, sending y..." -ForegroundColor Cyan
                      $process.StandardInput.WriteLine("y")
                      $process.StandardInput.Flush()
                  }
              }
          }
          
          if ($process.ExitCode -ne 0) {
              Write-Error "Build process exited with code: $($process.ExitCode)"
              exit $process.ExitCode
          }

      - name: Package output files
        id: pack_step
        shell: cmd
        run: |
          mkdir libmpv_output
          mkdir libmpv_output\include
          xcopy m\local64\bin-video\include\* libmpv_output\include\ /E /Y /I
          copy m\local64\bin-video\libmpv.dll.a libmpv_output\ /Y
          copy m\local64\bin-video\libmpv-2.dll libmpv_output\ /Y

          echo # libmpv Windows Build Info > libmpv_output\BUILD_INFO.md
          echo ## Base Info >> libmpv_output\BUILD_INFO.md
          echo - Toolchain: MinGW Clang x86_64 >> libmpv_output\BUILD_INFO.md
          echo - Arch: 64bit >> libmpv_output\BUILD_INFO.md
          echo - Features: libplacebo + libdovi DolbyVision >> libmpv_output\BUILD_INFO.md
          echo - FFmpeg: full >> libmpv_output\BUILD_INFO.md

          powershell Compress-Archive -Path libmpv_output -DestinationPath libmpv-win64.zip -Force
          echo zipname=libmpv-win64.zip >> %GITHUB_OUTPUT%

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-stable
          release_name: libmpv Windows x64 Clang Full DolbyVision (v12.7)
          body: |
            ### Build Info
            - Clang x64 static build libmpv
            - Built-in FFmpeg + libplacebo + libdovi (DolbyVision P5/P8)
            - Single libmpv-2.dll to run
          files: ${{ steps.pack_step.outputs.zipname }}
          overwrite: true
