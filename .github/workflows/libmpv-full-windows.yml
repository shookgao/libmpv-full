name: Build libmpv Windows Release (v12.1)
run-name: Build libmpv x64 Clang Full DV (v12.1)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-libmpv:
    runs-on: windows-latest
    steps:
      - name: Checkout mabs
        uses: actions/checkout@v4
        with:
          repository: m-ab-s/media-autobuild_suite
          path: mabs
          fetch-depth: 1

      - name: Cache build v12
        uses: actions/cache@v4
        with:
          path: |
            mabs/toolchain
            mabs/build
          key: win-mabs-clang-v12

      - name: Prepare build dir
        shell: cmd
        working-directory: ./mabs
        run: if not exist build mkdir build

      # 核心修复 v12.1：修正了上个版本导致 YAML 语法错误的无用行
      - name: Generate Base Config
        shell: cmd
        working-directory: ./mabs
        run: |
          echo [General]> build\media-autobuild_suite.ini
          echo Architecture=3>> build\media-autobuild_suite.ini
          echo DeleteGit=n>> build\media-autobuild_suite.ini
          echo UpdateSuite=y>> build\media-autobuild_suite.ini
          echo Force32=n>> build\media-autobuild_suite.ini
          echo DeleteBuild=y>> build\media-autobuild_suite.ini
          echo License=full>> build\media-autobuild_suite.ini
          echo Compiler=clang>> build\media-autobuild_suite.ini
          echo ScriptInPath=y>> build\media-autobuild_suite.ini
          echo OptionChoice=y>> build\media-autobuild_suite.ini
          echo [vlc]>> build\media-autobuild_suite.ini
          echo vlcChoice=n>> build\media-autobuild_suite.ini
          echo [mpv]>> build\media-autobuild_suite.ini
          echo mpvChoice=y>> build\media-autobuild_suite.ini
          echo mpv64=y>> build\media-autobuild_suite.ini
          echo [ffmpeg]>> build\media-autobuild_suite.ini
          echo ffmpegChoice=y>> build\media-autobuild_suite.ini
          echo ffmpeg64=y>> build\media-autobuild_suite.ini
          echo [media-autobuild_suite]>> build\media-autobuild_suite.ini
          echo mabsChoice=y>> build\media-autobuild_suite.ini
          copy build\media-autobuild_suite.ini media-autobuild_suite.ini /Y

      # 使用 .NET 进程管道在后台直接拉起并自动灌入输入流
      - name: Force Feed Standard Input via .NET Process
        shell: powershell
        working-directory: ./mabs
        run: |
          $pInfo = New-Object System.Diagnostics.ProcessStartInfo
          $pInfo.FileName = "cmd.exe"
          $pInfo.Arguments = "/c media-autobuild_suite.bat --unattended --silent"
          $pInfo.RedirectStandardInput = $true
          $pInfo.RedirectStandardOutput = $true
          $pInfo.RedirectStandardError = $true
          $pInfo.UseShellExecute = $false
          
          $process = New-Object System.Diagnostics.Process
          $process.StartInfo = $pInfo
          
          [void]$process.Start()
          
          # 连续向标准输入流灌入选择，回车闭合以击穿可能的交互提问
          $process.StandardInput.WriteLine("3")
          $process.StandardInput.WriteLine("y")
          $process.StandardInput.WriteLine("y")
          $process.StandardInput.Flush()
          
          # 实时打印终端输出
          while (-not $process.HasExited) {
              $output = $process.StandardOutput.ReadLine()
              if ($output) { Write-Host $output }
          }
          
          if ($process.ExitCode -ne 0) {
              $err = $process.StandardError.ReadToEnd()
              Write-Error "构建失败，错误信息: $err"
              exit $process.ExitCode
          }

      - name: Package output files
        id: pack_step
        shell: cmd
        run: |
          mkdir libmpv_output
          mkdir libmpv_output\include
          xcopy mabs\local64\bin-video\include\* libmpv_output\include\ /E /Y /I
          copy mabs\local64\bin-video\libmpv.dll.a libmpv_output\ /Y
          copy mabs\local64\bin-video\libmpv-2.dll libmpv_output\ /Y

          echo # libmpv Windows Build Info > libmpv_output\BUILD_INFO.md
          echo ## Base Info >> libmpv_output\BUILD_INFO.md
          echo - Toolchain: MinGW Clang x86_64 >> libmpv_output\BUILD_INFO.md
          echo - Arch: 64bit >> libmpv_output\BUILD_INFO.md
          echo - Features: libplacebo + libdovi DolbyVision >> libmpv_output\BUILD_INFO.md
          echo - FFmpeg: full >> libmpv_output\BUILD_INFO.md

          powershell Compress-Archive -Path libmpv_output -DestinationPath libmpv-win64.zip -Force
          echo zipname=libmpv-win64.zip >> %GITHUB_OUTPUT%

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-stable
          release_name: libmpv Windows x64 Clang Full DolbyVision (v12.1)
          body: |
            ### Build Info
            - Clang x64 static build libmpv
            - Built-in FFmpeg + libplacebo + libdovi (DolbyVision P5/P8)
            - Single libmpv-2.dll to run
          files: ${{ steps.pack_step.outputs.zipname }}
          overwrite: true
